name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  BUN_VERSION: '1.2.15'
  TAURI_CLI_VERSION: '2.10.1'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-amd64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macos-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli@${{ env.TAURI_CLI_VERSION }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libcairo2-dev \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build Desktop UI
        run: bun run build:desktop-ui

      - name: Build Tauri app
        run: cd packages/desktop && cargo tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: |
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            packages/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: ignore

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=desktop-v${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "draft=${{ inputs.draft }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#desktop-v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.exe" -o -name "*.msi" \) -exec cp {} release/ \;
          echo "Release files:"
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: LGR Desktop ${{ steps.version.outputs.version }}
          draft: ${{ steps.version.outputs.draft }}
          prerelease: false
          files: release/*
          body: |
            ## LGR Desktop ${{ steps.version.outputs.version }}

            Offline-first ERP desktop application. All data stored locally in SQLite.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows (installer) | `LGR-Desktop_${{ steps.version.outputs.version }}_x64-setup.exe` |
            | macOS (Apple Silicon) | `LGR-Desktop_${{ steps.version.outputs.version }}_aarch64.dmg` |
            | macOS (Intel) | `LGR-Desktop_${{ steps.version.outputs.version }}_x64.dmg` |
            | Linux (Debian/Ubuntu) | `lgr-desktop_${{ steps.version.outputs.version }}_amd64.deb` |
            | Linux (AppImage) | `LGR-Desktop_${{ steps.version.outputs.version }}_amd64.AppImage` |

            ### First Launch

            1. Open LGR Desktop
            2. Log in with default credentials: `admin` / `admin123`
            3. Change the password in Settings

            ### Requirements

            - **Bun** runtime must be installed: https://bun.sh
              ```bash
              curl -fsSL https://bun.sh/install | bash
              ```
